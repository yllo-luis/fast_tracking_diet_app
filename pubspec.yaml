name: fast_tracking_diet_app
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 0.0.1+1

environment:
  sdk: ^3.11.4

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  # Layout packages
  cupertino_icons: ^1.0.8
  lottie: ^3.3.3
  flutter_svg: ^2.2.4
  google_fonts: ^8.0.2
  intl: ^0.20.2
  password_strength_checker: ^1.3.2
  slide_countdown: ^2.0.2
  syncfusion_flutter_charts: ^33.2.3

  # Dependency and state management packages
  flutter_modular: ^6.4.1
  flutter_bloc: ^9.1.1

  # Networking packages
  dio: ^5.9.2
  pretty_dio_logger: ^1.4.0

  # Testing packages.
  mockito: ^5.6.4

  # Local storage packages.
  sqflite: ^2.4.2+1
  shared_preferences: ^2.5.5

  # Misc packages.
  build_runner: ^2.14.1
  intl_utils: ^2.8.14
  path: ^1.9.1
  email_validator: ^3.0.0
  share_plus: ^13.1.0
  timezone: ^0.11.0
  mask_text_input_formatter: ^2.9.0

  # Firebase related packages.
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0

  # Background service packages.
  flutter_background: ^1.3.1
  flutter_local_notifications: ^21.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/
